<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <style>
        body { width: 350px; margin: 120px auto; font-family: Arial, sans-serif; }
        .form-group { margin: 15px 0; }
        label { display: block; font-size: 16px; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .error { color: #dc3545; text-align: center; margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <h2 align="center">用户登录</h2>
    <form action="login.php" method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required placeholder="输入用户名">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required placeholder="输入密码">
        </div>
        <button type="submit">登录</button>
        <div class="error" id="errAccount">账号或密码错误！</div>
        <div class="error" id="errExpired">会话已过期，请重新登录！</div>
        <div class="error" id="errKicked">已被其他终端强制下线！</div>
    </form>

    <script>
        // 显示对应错误提示
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) document.getElementById('errAccount').style.display = 'block';
        if (urlParams.has('expired')) document.getElementById('errExpired').style.display = 'block';
        if (urlParams.has('kicked')) document.getElementById('errKicked').style.display = 'block';
    </script>
</body>
</html>
